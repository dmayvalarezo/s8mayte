<!DOCTYPE html>
<html>
<head>
    <title>Mi página web</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            margin: 20px;
        }

        header {
            background-color: #1e88e5;
            color: white;
            padding: 20px;
            text-align: center;
        }

        section {
            background-color: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
        }

        button {
            background-color: #ffca28;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Nombre de mi página</h1>
        <p>Descripción breve del proyecto</p>
    </header>

    <section>
        <h2>Productos o servicios</h2>
        <p>Escribe aquí qué ofrece tu página web</p>
        <button>Ver catálogo</button>
    </section>

    <section>
        <h2>Contacto</h2>
        <p>Correo: ejemplo@gmail.com</p>
        <p>Teléfono: 0999999999</p>
    </section>

</body>
</html>
